name: Publish to GitHub Packages

# Mirrors the published release to GitHub Packages under the @ross-sec scope
# (the npm registry publish under @ross_technologies is separate). Uses the
# built-in GITHUB_TOKEN — no extra secret required.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-gpr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # Install + build against the public npm registry (deps live there).
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build

      # Re-point the @ross-sec scope at GitHub Packages for the publish only.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@ross-sec"

      - name: Scope package name to @ross-sec for GitHub Packages
        run: node -e "const fs=require('fs'),p=JSON.parse(fs.readFileSync('package.json'));p.name='@ross-sec/image_studio_mcp';fs.writeFileSync('package.json',JSON.stringify(p,null,2))"

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
